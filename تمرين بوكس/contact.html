    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="container">

        <h2 class="logo">شركة المستقبل</h2>

        <nav>

            <ul>

                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>

            </ul>

        </nav>

    </div>

</header>

<section class="page-title">

    <div class="container">

        <h1>تواصل معنا</h1>

        <p>
            يسعدنا استقبال استفساراتكم ومقترحاتكم، يرجى تعبئة النموذج التالي.
        </p>

    </div>

</section>

<section class="contact">

    <div class="container">

        <form>

            <label for="name">الاسم الكامل</label>
            <input type="text" id="name" placeholder="اكتب اسمك">

            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com">

            <label for="phone">رقم الهاتف</label>
            <input type="tel" id="phone" placeholder="05XXXXXXXX">

            <label for="country">الدولة</label>
            <select id="country">
                <option>اختر الدولة</option>
                <option>سوريا</option>
                <option>تركيا</option>
                <option>السعودية</option>
                <option>الإمارات</option>
                <option>مصر</option>
            </select>

            <label for="message">الرسالة</label>
            <textarea id="message" rows="6" placeholder="اكتب رسالتك هنا..."></textarea>

            <button type="submit" class="btn">
                إرسال الرسالة
            </button>

        </form>

    </div>

</section>

<footer>

    <div class="container">

        <p>© 2026 جميع الحقوق محفوظة | شركة المستقبل</p>

    </div>

</footer>

</body>

</html>
