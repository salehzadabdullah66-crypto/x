<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
     <link  REL="stylesheet" href="stayl.css"/>
    <link  REL="stylesheet" href="animation.css"/>

</head>

<body>

    <h1 class="name">تواصل معنا</h1>

    <form action="#" method="post">

        <!-- الاسم -->
        <label for="name">الاسم:</label><br>
        <input
            type="text"
            id="name"
            name="name"
            placeholder="اكتب اسمك"
            required>

        <br><br>

        <!-- البريد الإلكتروني -->
        <label for="email">البريد الإلكتروني:</label><br>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            required>

        <br><br>

        <!-- رقم التواصل -->
        <label for="phone">رقم التواصل:</label><br>
        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="05XXXXXXXX"
            required>

        <br><br>

        <!-- الرسالة -->
        <label for="message">الرسالة:</label><br>
        <textarea
            id="message"
            name="message"
            rows="6"
            cols="40"
            placeholder="اكتب رسالتك هنا..."
            required></textarea>

        <br><br>

        <!-- زر الإرسال -->
        <button type="submit">إرسال</button>
        <figure>جميع الحقوق محفوظة</figure>

    </form>

</body>

</html>
