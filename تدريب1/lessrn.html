<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع بسيط</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- القائمة الرئيسية -->
    <header>
        <h1>موقعي</h1>

        <nav>
            <ul>
                <li><a href="hamo">الرئيسية</a></li>
                <li><a href="#contact">تواصل</a></li>
                <li><a href="#footer">الفوتر</a></li>
            </ul>
        </nav>
    </header>

    <!-- المحتوى -->
    <main>
        <section id="hamo">
            <h2>مرحباً بك</h2>
            <p>
                هذه صفحة HTML بسيطة تحتوي على قائمة رئيسية وقسم للتواصل وفوتر.
            </p>
        </section>

        <!-- قسم التواصل -->
        <section id="contact">
            <h2>تواصل معنا</h2>

            <form>
                <label>الاسم</label><br>
                <input type="text" placeholder="أدخل اسمك"><br><br>

                <label>البريد الإلكتروني</label><br>
                <input type="email" placeholder="example@email.com"><br><br>

                <label>الرسالة</label><br>
                <textarea rows="5" placeholder="اكتب رسالتك"></textarea><br><br>

                <button type="submit">إرسال</button>
            </form>
        </section>
    </main>

    <!-- الفوتر -->
    <footer id="footer">
        <p>© 2026 جميع الحقوق محفوظة - موقعي</p>
    </footer>

</body>
</html>
